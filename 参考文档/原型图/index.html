<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模拟城市记账本原型</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans SC"', '"PingFang SC"', "sans-serif"],
              display: ["Outfit", '"Noto Sans SC"', "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #fef3c7;
        --bg-2: #dbeafe;
        --bg-3: #ecfccb;
        --text-main: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Noto Sans SC", "PingFang SC", sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 26%),
          radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.5), transparent 28%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./bundle.js"></script>
  </body>
</html>
